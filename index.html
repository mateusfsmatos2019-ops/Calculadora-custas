<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Custas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .resultado {
      margin-top: 20px;
      padding: 10px;
      background: #020617;
      border-radius: 6px;
      text-align: center;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Custas</h1>

  <input type="number" id="valor" placeholder="Valor do processo">

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado">
    Resultado aparecerá aqui
  </div>
</div>

<script>
  function calcular() {
    let valor = document.getElementById("valor").value;

    if (valor === "") {
      document.getElementById("resultado").innerText = "Digite um valor!";
      return;
    }

    let resultado = valor * 0.1; // exemplo

    document.getElementById("resultado").innerText =
      "Total: R$ " + resultado.toFixed(2);
  }
</script>

</body>
</html>
